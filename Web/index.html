<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌾 Crop AI Assistant</title>

  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    /* Global Reset & Base Styling */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #n8n-chat {
      width: 100%;
      height: 100%;
      display: none; /* Hidden until location is set */
    }

    /* n8n Chat Widget Customization Variables */
    :root {
      --chat--color--primary: #2e7d32;       
      --chat--color--secondary: #558b2f;     
      --chat--color-light: #f1f8e9;          
      --chat--color-dark: #1b5e20;           

      --chat--header--background: var(--chat--color--primary);
      --chat--header--color: #ffffff;

      --chat--message--user--background: var(--chat--color--secondary);
      --chat--message--user--color: #ffffff;
      --chat--message--bot--background: #ffffff;
      --chat--message--bot--color: #333333;

      --chat--window--border-radius: 12px;
      --chat--spacing: 1rem;
      --chat--font-family: inherit;
    }

    /* Location Onboarding Overlay Styling */
    #location-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      z-index: 1000;
    }

    .location-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 350px;
      width: 90%;
    }

    .location-card h2 {
      margin-top: 0;
      color: var(--chat--color--primary);
    }

    .location-card p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: var(--chat--color--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--chat--color-dark);
    }

    .btn-secondary {
      background: var(--chat--color--secondary);
      color: white;
    }

    .btn-secondary:hover {
      background: #3e6b22;
    }

    .btn-text {
      background: transparent;
      color: #666;
      font-weight: normal;
      margin-bottom: 0;
    }
    
    .btn-text:hover {
      text-decoration: underline;
      background: transparent;
    }

    #error-msg {
      color: #d32f2f;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>

<body>

<div id="location-overlay">
  <div class="location-card">
    <h2>🌾 Welcome Farmer!</h2>
    <p>To provide accurate crop and weather advice, we need to know where your farm is located.</p>
    
    <button class="btn-primary" onclick="detectLocation()">📍 Auto-Detect My Location</button>
    
    <div style="margin: 15px 0; color: #888; font-size: 0.9rem;">— OR —</div>
    
    <input type="text" id="address-input" placeholder="Enter village, city, or district...">
    <button class="btn-secondary" onclick="searchAddress()">🔍 Find by Address</button>
    
    <div id="error-msg"></div>

    <button class="btn-text" onclick="skipLocation()">Skip for now (Continue without location)</button>
  </div>
</div>

<div id="n8n-chat"></div>

<script type="module">
import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

const overlay = document.getElementById('location-overlay');
const chatDiv = document.getElementById('n8n-chat');
const errorMsg = document.getElementById('error-msg');

// 1. Auto-Detect via Browser GPS
window.detectLocation = function() {
  errorMsg.innerText = "Detecting location...";
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      startChatSession(pos.coords.latitude, pos.coords.longitude);
    },
    (err) => {
      errorMsg.innerText = "Location denied or unavailable. Try entering an address.";
    }
  );
}

// 2. Geocode Address via OpenStreetMap (Free, No API Key)
window.searchAddress = async function() {
  const address = document.getElementById('address-input').value.trim();
  if (!address) {
    errorMsg.innerText = "Please enter an address first.";
    return;
  }

  errorMsg.innerText = "Searching...";
  try {
    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
    const data = await response.json();

    if (data && data.length > 0) {
      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);
      startChatSession(lat, lon);
    } else {
      errorMsg.innerText = "Address not found. Please try a different name.";
    }
  } catch (err) {
    errorMsg.innerText = "Network error. Please try again.";
  }
}

// 3. Skip Location completely
window.skipLocation = function() {
  startChatSession(null, null);
}

// 4. Transition from Setup to Chat
function startChatSession(lat, lon) {
  console.log("📍 Final Location for Chat:", lat, lon);
  
  // Hide overlay, show chat container
  overlay.style.display = 'none';
  chatDiv.style.display = 'block';
  
  // Initialize n8n chat
  initChat(lat, lon);
}

// 💬 Chat init (Your existing function, slightly modified to handle nulls)
function initChat(lat, lon) {
  const metadataParams = {};
  if (lat && lon) {
    metadataParams.lat = lat;
    metadataParams.lon = lon;
  }

  createChat({
    webhookUrl: "http://localhost:5678/webhook/41f6ff60-bfbb-4c72-bf75-9a7aeb22ba2a/chat",
    mode: "fullscreen",
    metadata: metadataParams,
    showWelcomeScreen: true,
    initialMessages: [
      "🌾 Welcome to your Crop Assistant!",
      "I'm ready to help. Tell me your soil values, or ask for farming advice."
    ],
    i18n: {
      en: {
        title: "🌾 Crop AI Assistant",
        subtitle: lat ? "Location acquired securely" : "Smart farming made simple"
      }
    }
  });
}
</script>

</body>
</html>
